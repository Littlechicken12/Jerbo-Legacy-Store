<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jerbo Legacy Store</title>

<style>
body{
    margin:0;
    font-family:Helvetica,Arial,sans-serif;
    background:#d8dce2;
}

.header{
    background:linear-gradient(#5fa9ff,#2d6dcc);
    color:white;
    text-align:center;
    padding:12px;
    border-bottom:1px solid #1d4f99;
    text-shadow:0 -1px 0 #1d4f99;
}

.header h1{
    margin:0;
    font-size:28px;
}

.navbar{
    background:linear-gradient(#f7f7f7,#d6d6d6);
    border-top:1px solid white;
    border-bottom:1px solid #999;
    text-align:center;
    padding:10px;
}

.navbar a{
    color:#007aff;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:900px;
    margin:15px auto;
}

.section{
    background:white;
    border-radius:10px;
    border:1px solid #b8b8b8;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
}

.section-title{
    background:linear-gradient(#fdfdfd,#e6e6e6);
    padding:10px;
    border-bottom:1px solid #b8b8b8;
    font-weight:bold;
}

.app{
    display:flex;
    align-items:center;
    padding:12px;
    border-bottom:1px solid #e0e0e0;
}

.app:last-child{
    border-bottom:none;
}

.app img{
    width:57px;
    height:57px;
    border-radius:10px;
    margin-right:10px;
}

.info{
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.version{
    color:#777;
    font-size:13px;
}

.install{
    background:linear-gradient(#7ecb4f,#4eaa1f);
    border:1px solid #3b8518;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:12px;
    font-weight:bold;
}

.footer{
    text-align:center;
    color:#666;
    padding:20px;
}
</style>

</head>
<body>

<div class="header">
    <h1>Jerbo Legacy Store</h1>
</div>

<div class="navbar">
    <a href="#">Featured</a>
    <a href="#">Categories</a>
    <a href="#">Search</a>
    <a href="#">Updates</a>
</div>

<div class="container">

<div class="section">
<div class="section-title">
Featured Apps
</div>

<div class="app">
<img src="icons/testapp.png">
<div class="info">
<div class="name">Test App</div>
<div class="version">Version 1.0</div>
</div>
<a class="install" href="ipa/testapp.ipa">FREE</a>
</div>

</div>

</div>

<div class="footer">
Jerbo Legacy Store • Compatible with iOS 3–7
</div>

</body>
</html>
